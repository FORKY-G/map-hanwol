<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한월환해도 (0413 업데이트)</title>
    <link rel="icon" type="image/png" href="images/hanwol-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        /* [기본 스타일] */
        body { margin: 0; padding: 0; background-color: #1a1a1a; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; }

        /* [컨트롤 패널 레이아웃] */
        #controls-wrapper {
            position: fixed;
            top: 15px; right: 150px; 
            z-index: 1000;
            display: flex;
            flex-direction: row-reverse;
            align-items: flex-start;
            gap: 10px;
        }

        /* [비급 정보창 스타일] */
        #skill-btn {
            position: fixed; top: 80px; left: 12px; z-index: 1000; cursor: pointer;
            transition: transform 0.2s;
        }
        #skill-btn:hover { transform: scale(1.1); }
        #skill-window {
            display: none; position: fixed; top: 80px; left: 70px; z-index: 1000; 
            width: 320px; max-height: 70vh; background: white; border: 2px solid #000; 
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2); overflow-y: auto; font-family: 'Pretendard', sans-serif;
        }
        #skill-window::-webkit-scrollbar { width: 8px; }
        #skill-window::-webkit-scrollbar-thumb { background: #000; border-radius: 4px; }
        #skill-window::-webkit-scrollbar-track { background: #eee; }

        /* [검색 시스템] */
        #search-container { display: flex; position: relative; }
        #search-input {
            width: 180px;
            padding: 7px 10px;
            border: 2px solid #000;
            font-family: 'Pretendard', sans-serif;
            font-weight: 700;
            outline: none;
        }
        #search-results {
            position: absolute;
            top: 40px; left: 0;
            width: 240px;
            background: white;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            display: none;
            z-index: 1002;
            max-height: 300px;
            overflow-y: auto;
        }
        .search-result-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; font-weight: 700; }
        .search-result-item:hover { background: #f0f0f0; }
        .search-result-item .category { font-size: 10px; color: #888; display: block; }

        /* [사이드바 메뉴] */
        #toggle-sidebar {
            background: #fff;
            border: 2px solid #000;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            font-size: 14px;
            white-space: nowrap;
        }
        #controls {
            position: absolute;
            top: 45px; right: 0;
            width: 240px;
            max-height: 0; 
            background: rgba(255, 255, 255, 0.98);
            border: 0px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            overflow-y: auto;
            overflow-x: hidden;
            transition: max-height 0.4s ease;
            color: #000;
            padding: 0;
        }
        #controls.active { max-height: 80vh; border: 2px solid #000; padding: 12px; }

        /* [필터 아이템 스타일] */
        .control-header { border-bottom: 2px solid #000; margin-bottom: 12px; padding-bottom: 5px; }
        .control-title { font-size: 16px; font-weight: 900; margin: 0; }
        .control-group { margin-bottom: 15px; }
        .control-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .control-item img { width: 20px; height: 20px; margin-right: 10px; object-fit: contain; }
        .color-dot { width: 14px; height: 14px; border: 1px solid #000; margin-right: 10px; border-radius: 2px; }
        .divider { border-top: 1px solid #ccc; margin: 10px 0; }
        
        /* [아코디언] */
        .accordion-header { background: #e0e0e0; padding: 8px; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #000; border-radius: 4px; font-size: 13px; }
        .accordion-content { display: none; padding: 10px 5px; border: 1px solid #ccc; border-top: none; }
        .accordion-content.active { display: block; }

        /* [리플렛 커스텀] */
        .leaflet-popup-content-wrapper { background-color: #c6c6c6; border: 2px solid #000; border-radius: 0; box-shadow: inset 2px 2px 0px #fff, inset -2px -2px 0px #555 !important; }
        .leaflet-popup-tip-container, .leaflet-popup-close-button { display: none !important; }
        .leaflet-popup-content { font-family: 'Pretendard', sans-serif; font-weight: 700; text-align: center; color: #000; margin: 10px 14px !important; line-height: 1.4; }

        /* [마커 및 알림창] */
        #copy-toast { 
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%); 
            background-color: #ffd700; color: #000; padding: 10px 24px; 
            border: 2px solid #000; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            font-weight: 900; z-index: 11000; display: none; border-radius: 4px;
        }
        .mine-marker { border: 1px solid #000; border-radius: 2px; }
        .mine-녹 { background-color: #2ecc71; } .mine-황 { background-color: #f1c40f; } .mine-청 { background-color: #3498db; } .mine-적 { background-color: #e74c3c; }
        .special-mine { border: 2.5px solid #fff !important; box-shadow: 0 0 8px #fff, 0 0 12px #f00 !important; z-index: 1000 !important; }
    </style>
</head>

<body>

    <div id="notice-modal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 20000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 25px; border-radius: 2px; width: 90%; max-width: 400px; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); border: 2px solid #000; font-family: 'Pretendard', sans-serif;">
        <div style="font-size: 18px; font-weight: 900; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center;">
            <span style="margin-right: 8px;">📢</span> 한월서버 공지사항
        </div>
        <div style="font-size: 14px; line-height: 1.6; color: #333; font-weight: 700;">
            <p style="margin-top: 0; color: #d00;">[0413 한월서버 공지 내역]</p>
            <ul style="padding-left: 20px; margin-bottom: 20px;">
                <li>운기조식 기능 업데이트</li>
                <li>파티레이드 업데이트</li>
                <li>[웹맵공지] 적환단 8.9 위치 업데이트</li>
                <li>정보 오류 및 추가 원할 시 연락주세요.</li>
            </ul>
            <p style="font-size: 12px; color: #666; font-weight: 500; border-top: 1px dashed #ccc; padding-top: 10px;">
                ※ 자세한 업데이트 내역은 서버 디스코드를 이용해주세요.
            </p>
        </div>
        <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <label style="font-size: 12px; color: #666; cursor: pointer; display: flex; align-items: center; font-weight: 700;">
                <input type="checkbox" id="stop-showing" style="margin-right: 5px; cursor: pointer;"> 오늘 다시 보지 않기
            </label>
            <button onclick="closeNotice()" style="padding: 8px 24px; background: #000; color: #fff; border: none; font-weight: 900; cursor: pointer; font-family: 'Pretendard';">확인</button>
        </div>
    </div>
</div>

    <div id="skill-btn">
        <img src="images/skill.png" style="width: 44px; height: 44px; border: 2px solid #000; background: #fff; box-shadow: 4px 4px 0px rgba(0,0,0,0.2);" alt="Skill Icon">
    </div>
    <div id="skill-window">
        <div style="background: #000; color: #fff; padding: 12px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10;">
            <span>📜 비급 획득 정보</span>
            <span onclick="toggleSkillWindow()" style="cursor: pointer; font-size: 18px;">✖</span>
        </div>
        <div id="skill-list-content" style="padding: 12px;">
            </div>
    </div>

    <div id="map"></div>
    <div id="copy-toast" style="display: none; align-items: center; justify-content: center; gap: 10px;">
    <img src="images/forky.png" style="width: 25px; height: 25px; object-fit: contain;">
    <span id="toast-text">복사 완료!</span>
    </div>

    <div id="controls-wrapper">
        <div id="toggle-sidebar">▼ 한월메뉴 열기</div>

        <div id="search-container">
            <input type="text" id="search-input" placeholder="정보 및 위치 검색...">
            <div id="search-results"></div>
        </div>

        <div id="controls">
            <div class="control-header">
                <h3 class="control-title">한월서버</h3>
            </div>

            <div class="control-group">
                <label class="control-item"><input type="checkbox" id="check-spawn" checked> <img src="images/compass.png"> 스폰 지점</label>
                <label class="control-item"><input type="checkbox" id="check-animals" checked> <img src="images/forky.png"> 십이지신</label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-item"><input type="checkbox" id="check-stones"> <img src="images/stone.png"> 산/동상</label>
                <label class="control-item"><input type="checkbox" id="check-npc"> <img src="images/forky.png"> NPC</label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-item"><input type="checkbox" id="check-red"> <img src="images/red.png"> 적환단</label>
                <label class="control-item"><input type="checkbox" id="check-pot"> <img src="images/pot.png"> 탐색(항아리)</label>
                <label class="control-item"><input type="checkbox" id="check-box"> <img src="images/box.png"> 의문의 상자</label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <div style="font-weight: 900; margin-bottom: 8px; font-size: 13px;">광산 구역</div>
                <label class="control-item"><input type="checkbox" id="mine-녹"> <div class="color-dot" style="background:#2ecc71;"></div> 녹색광산</label>
                <label class="control-item"><input type="checkbox" id="mine-청"> <div class="color-dot" style="background:#3498db;"></div> 청색광산</label>
                <label class="control-item"><input type="checkbox" id="mine-황"> <div class="color-dot" style="background:#f1c40f;"></div> 황색광산</label>
                <label class="control-item"><input type="checkbox" id="mine-적"> <div class="color-dot" style="background:#e74c3c;"></div> 적색광산</label>
            </div>

            <div class="control-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <div class="accordion-header" id="hunt-accordion-btn" style="flex: 1; margin-right: 5px;">사냥터 목록 <span>▼</span></div>
                    <button id="reset-hunt" style="padding: 5px 8px; font-size: 11px; font-weight: 800; cursor: pointer; border: 2px solid #000; background: #fff;">초기화</button>
                </div>
                <div class="accordion-content" id="hunt-accordion-content"></div>
            </div>

            <div class="control-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <div class="accordion-header" id="herb-accordion-btn" style="flex: 1; margin-right: 5px;">약초 목록 <span>▼</span></div>
                    <button id="reset-herb" style="padding: 5px 8px; font-size: 11px; font-weight: 800; cursor: pointer; border: 2px solid #000; background: #fff;">초기화</button>
                </div>
                <div class="accordion-content" id="herb-accordion-content"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/data.js"></script>         
    <script src="js/map-logic.js"></script>    
    <script src="js/ui-control.js"></script>   

    <script>
        // [공지사항 제어]
const modal = document.getElementById('notice-modal');

// 닫기 함수를 window 객체에 직접 연결해서 onclick 에러를 방지합니다.
window.closeNotice = function() {
    const stopShowing = document.getElementById('stop-showing');
    if (stopShowing && stopShowing.checked) {
        // 오늘 날짜를 키값으로 저장해서 내일은 다시 뜨게 합니다.
        localStorage.setItem('hideNotice_20260408', 'true');
    }
    if (modal) modal.style.display = 'none';
};

// 페이지 시작 시 '다시 보지 않기' 체크
window.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('hideNotice_20260408') === 'true') {
        if (modal) modal.style.display = 'none';
    }
});

        const sidebar = document.getElementById('controls');
        const toggleBtn = document.getElementById('toggle-sidebar');
        const searchResultsDiv = document.getElementById('search-results');

        // 사이드바 토글 함수
        function toggleSidebar() {
            if (!sidebar) return;
            sidebar.classList.toggle('active');
            toggleBtn.innerText = sidebar.classList.contains('active') ? '▲ 한월메뉴 닫기' : '▼ 한월메뉴 열기';
        }

        if (toggleBtn) {
            toggleBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSidebar(); });
        }

        // 지도 클릭 시 사이드바 및 검색창 닫기
        if (typeof map !== 'undefined') {
            map.on('click', () => {
                if (sidebar && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                    toggleBtn.innerText = '▼ 한월메뉴 열기';
                }
                if (searchResultsDiv) searchResultsDiv.style.display = 'none';
            });
        }

        if (sidebar) sidebar.addEventListener('click', (e) => e.stopPropagation());

        // 아코디언 범용 함수
        function bindAccordion(btnId, contentId) {
            const btn = document.getElementById(btnId);
            const content = document.getElementById(contentId);
            if (btn && content) {
                btn.addEventListener('click', function() {
                    content.classList.toggle('active');
                    const span = this.querySelector('span');
                    if(span) span.innerText = content.classList.contains('active') ? '▲' : '▼';
                });
            }
        }

        bindAccordion('hunt-accordion-btn', 'hunt-accordion-content');
        bindAccordion('herb-accordion-btn', 'herb-accordion-content');
    </script>
</body>
</html>
