<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한월환해도 (0408 업데이트)</title>
    <link rel="icon" type="image/png" href="images/hanwol-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        body { margin: 0; padding: 0; background-color: #1a1a1a; font-family: 'Pretendard', sans-serif; }
        #map { width: 100vw; height: 100vh; }

        /* [수정] 컨트롤 패널 가로 배치 및 위치 조정 */
        #controls-wrapper {
            position: fixed;
            top: 15px; 
            right: 150px; 
            z-index: 1000;
            display: flex;
            flex-direction: row-reverse; /* 검색창(왼쪽), 버튼(오른쪽) */
            align-items: flex-start;
            gap: 10px;
        }

        /* 검색창 컨테이너 */
        #search-container {
            display: flex;
            position: relative;
        }

        #search-input {
            width: 180px;
            padding: 7px 10px;
            border: 2px solid #000;
            font-family: 'Pretendard', sans-serif;
            font-weight: 700;
            outline: none;
        }

        /* 검색 결과 드롭다운 */
        #search-results {
            position: absolute;
            top: 40px; left: 0;
            width: 240px;
            background: white;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            display: none;
            z-index: 1002;
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
        }
        .search-result-item:hover { background: #f0f0f0; }
        .search-result-item .category { font-size: 10px; color: #888; display: block; }

        /* 메뉴 열기/닫기 버튼 */
        #toggle-sidebar {
            background: #fff;
            border: 2px solid #000;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            font-size: 14px;
            white-space: nowrap;
        }

        /* 필터 목록 창 (위아래 슬라이드) */
        #controls {
            position: absolute;
            top: 45px; right: 0;
            width: 240px;
            max-height: 0; 
            background: rgba(255, 255, 255, 0.98);
            border: 0px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            overflow-y: auto;
            overflow-x: hidden;
            transition: max-height 0.4s ease;
            color: #000;
            padding: 0; /* 닫혔을 땐 패딩 0 */
        }

        #controls.active {
            max-height: 80vh;
            border: 2px solid #000;
            padding: 12px;
        }

        /* 내부 스타일 유지 */
        .control-header { border-bottom: 2px solid #000; margin-bottom: 12px; padding-bottom: 5px; }
        .control-title { font-size: 16px; font-weight: 900; margin: 0; }
        .control-group { margin-bottom: 15px; }
        .control-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .control-item img { width: 20px; height: 20px; margin-right: 10px; object-fit: contain; }
        .control-item input { margin-right: 8px; cursor: pointer; }
        .color-dot { width: 14px; height: 14px; border: 1px solid #000; margin-right: 10px; border-radius: 2px; }
        .divider { border-top: 1px solid #ccc; margin: 10px 0; }
        .accordion-header { background: #e0e0e0; padding: 8px; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #000; border-radius: 4px; font-size: 13px; }
        .accordion-content { display: none; padding: 10px 5px; border: 1px solid #ccc; border-top: none; }
        .accordion-content.active { display: block; }

        /* 리플렛 팝업 스타일 */
        .leaflet-popup-content-wrapper { background-color: #c6c6c6; border: 2px solid #000000; border-radius: 0; box-shadow: inset 2px 2px 0px #ffffff, inset -2px -2px 0px #555555 !important; padding: 0px; }
        .leaflet-popup-tip-container, .leaflet-popup-close-button { display: none !important; }
        .leaflet-popup-content { font-family: 'Pretendard', sans-serif; font-weight: 700; font-size: 13px; text-align: center; color: #000000; margin: 10px 14px !important; line-height: 1.4; letter-spacing: -0.5px; }
        
        #copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 8px 16px; border: 1px solid #ffffff; font-size: 14px; z-index: 10000; display: none; }
        .mine-marker { border: 1px solid #000; border-radius: 2px; }
        .mine-녹 { background-color: #2ecc71; } .mine-황 { background-color: #f1c40f; } .mine-청 { background-color: #3498db; } .mine-적 { background-color: #e74c3c; }
        .special-mine { border: 2.5px solid #ffffff !important; box-shadow: 0 0 8px #fff, 0 0 12px #ff0000 !important; z-index: 1000 !important; }
    
    /* 팝업 배경 (어둡게) */
.modal-overlay {
    display: flex;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 9999; /* 지도보다 위에 떠야 함 */
    justify-content: center;
    align-items: center;
}

/* 팝업 박스 */
.modal-content {
    background: white;
    padding: 20px;
    border-radius: 8px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.modal-header {
    font-size: 18px;
    font-weight: 800;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
    margin-bottom: 15px;
}

.modal-body {
    font-size: 14px;
    line-height: 1.6;
    color: #333;
}

.modal-footer {
    margin-top: 20px;
    text-align: right;
}

.modal-footer button {
    padding: 8px 20px;
    background: #333;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
    
    </style>
</head>
    
<body>

    <div id="map"></div>
    <div id="copy-toast">복사 완료!</div>

    <div id="controls-wrapper">
        <div id="toggle-sidebar">▼ 한월메뉴 열기</div>

        <div id="search-container">
            <input type="text" id="search-input" placeholder="정보 및 위치 검색...">
            <div id="search-results"></div>
        </div>
        
        <div id="controls">
            <div class="control-header">
                <h3 class="control-title">한월서버</h3>
            </div>
            
            <div class="control-group">
                <label class="control-item">
                    <input type="checkbox" id="check-spawn" checked> <img src="images/compass.png"> 스폰 지점
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-animals" checked> <img src="images/forky.png"> 십이지신
                </label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-item">
                    <input type="checkbox" id="check-stones"> <img src="images/stone.png"> 산/동상
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-npc"> <img src="images/forky.png"> NPC
                </label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-item">
                    <input type="checkbox" id="check-red"> <img src="images/red.png"> 적환단
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-pot"> <img src="images/pot.png"> 탐색(항아리)
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-box"> <img src="images/box.png"> 의문의 상자
                </label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <div style="font-weight: 900; margin-bottom: 8px; font-size: 13px;">광산 구역</div>
                <label class="control-item">
                    <input type="checkbox" id="mine-녹"> <div class="color-dot" style="background:#2ecc71;"></div> 녹색광산
                </label>
                <label class="control-item">
                    <input type="checkbox" id="mine-청"> <div class="color-dot" style="background:#3498db;"></div> 청색광산
                </label>
                <label class="control-item">
                    <input type="checkbox" id="mine-황"> <div class="color-dot" style="background:#f1c40f;"></div> 황색광산
                </label>
                <label class="control-item">
                    <input type="checkbox" id="mine-적"> <div class="color-dot" style="background:#e74c3c;"></div> 적색광산
                </label>
            </div>

            <div class="control-group">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <div class="accordion-header" id="hunt-accordion-btn" style="flex: 1; margin-right: 5px;">
            사냥터 목록 <span>▼</span>
        </div>
        <button id="reset-hunt" style="padding: 5px 8px; font-size: 11px; font-weight: 800; cursor: pointer; border: 2px solid #000; background: #fff;">초기화</button>
    </div>
    <div class="accordion-content" id="hunt-accordion-content"></div>
</div>

<div class="control-group">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <div class="accordion-header" id="herb-accordion-btn" style="flex: 1; margin-right: 5px;">
            약초 목록 <span>▼</span>
        </div>
        <button id="reset-herb" style="padding: 5px 8px; font-size: 11px; font-weight: 800; cursor: pointer; border: 2px solid #000; background: #fff;">초기화</button>
    </div>
    <div class="accordion-content" id="herb-accordion-content"></div>
</div>
        </div> </div> 

    <div id="notice-modal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 10001; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: white; padding: 25px; border-radius: 2px; width: 90%; max-width: 400px; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); border: 2px solid #000; font-family: 'Pretendard', sans-serif;">
        <div style="font-size: 18px; font-weight: 900; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center;">
            <span style="margin-right: 8px;">📢</span> 한월서버 공지사항
        </div>
        <div style="font-size: 14px; line-height: 1.6; color: #333; font-weight: 700;">
            <p style="margin-top: 0; color: #d00;">[0408 서버 업데이트 내역]</p>
            <ul style="padding-left: 20px; margin-bottom: 20px;">
                <li>토벌의뢰 기능 업데이트</li>
                <li>광산의 도둑토끼 사냥 시 토끼내단 드랍 추가</li>
                <li>서고관리인에 벽력공, 천뢰공 비급 제작 추가</li>
            </ul>
            <p style="font-size: 12px; color: #666; font-weight: 500; border-top: 1px dashed #ccc; padding-top: 10px;">
                ※ 자세한 업데이트 내역은 서버 디스코드를 이용해주세요.
            </p>
        </div>
        <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <label style="font-size: 12px; color: #666; cursor: pointer; display: flex; align-items: center; font-weight: 700;">
                <input type="checkbox" id="stop-showing" style="margin-right: 5px; cursor: pointer;"> 오늘 다시 보지 않기
            </label>
            <button onclick="closeNotice()" style="padding: 8px 24px; background: #000; color: #fff; border: none; font-weight: 900; cursor: pointer; font-family: 'Pretendard';">확인</button>
        </div>
    </div>
</div>
    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/data.js"></script>         
    <script src="js/map-logic.js"></script>    
    <script src="js/ui-control.js"></script>   

<script>
    const sidebar = document.getElementById('controls');
    const toggleBtn = document.getElementById('toggle-sidebar');
    const searchResultsDiv = document.getElementById('search-results');

    // [1] 사이드바 토글 함수
    function toggleSidebar() {
        if (!sidebar) return;
        sidebar.classList.toggle('active');
        toggleBtn.innerText = sidebar.classList.contains('active') ? '▲ 한월메뉴 닫기' : '▼ 한월메뉴 열기';
    }

    if (toggleBtn) {
        toggleBtn.addEventListener('click', function(e) { 
            e.stopPropagation(); 
            toggleSidebar(); 
        });
    }

    // [2] 지도 클릭 시 처리 (공지사항 팝업 제외)
    if (typeof map !== 'undefined') {
        map.on('click', function() {
            if (sidebar && sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
                toggleBtn.innerText = '▼ 한월메뉴 열기';
            }
            if (searchResultsDiv) searchResultsDiv.style.display = 'none';
        });
    }

    if (sidebar) {
        sidebar.addEventListener('click', function(e) { 
            e.stopPropagation(); 
        });
    }

    // [3] 아코디언 바인딩 함수
    function bindAccordion(btnId, contentId) {
        const btn = document.getElementById(btnId);
        const content = document.getElementById(contentId);
        if (btn && content) {
            btn.addEventListener('click', function() {
                content.classList.toggle('active');
                const span = this.querySelector('span');
                if (span) {
                    span.innerText = content.classList.contains('active') ? '▲' : '▼';
                }
            });
        }
    }

    // [4] 공지사항 팝업 제어
    window.addEventListener('load', function() {
        const isHidden = localStorage.getItem('hideNotice');
        const modal = document.getElementById('notice-modal');
        if (modal) {
            if (isHidden === 'true') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'flex';
            }
        }
    });

    function closeNotice() {
        const modal = document.getElementById('notice-modal');
        const checkbox = document.getElementById('stop-showing');
        if (modal) {
            if (checkbox && checkbox.checked) {
                localStorage.setItem('hideNotice', 'true');
            }
            modal.style.display = 'none';
        }
    }

    const noticeModal = document.getElementById('notice-modal');
    if (noticeModal) {
        noticeModal.addEventListener('click', function(e) {
            if (e.target === this) closeNotice();
        });

        const modalContent = noticeModal.querySelector('.modal-content');
        if (modalContent) {
            modalContent.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }
    }

    // [5] 아코디언 실행
    bindAccordion('hunt-accordion-btn', 'hunt-accordion-content');
    bindAccordion('herb-accordion-btn', 'herb-accordion-content');
</script>
</body>
</html>
