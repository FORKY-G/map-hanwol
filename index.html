<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한월환해도 (0405 업데이트)</title>
    
    <link rel="icon" type="image/png" href="images/hanwol-icon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        /* 1. 고딕체 폰트 불러오기 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        body { 
            margin: 0; padding: 0; background-color: #1a1a1a; 
            font-family: 'Pretendard', sans-serif;
        }
        
        #map { width: 100vw; height: 100vh; }
        
        /* [추가] 우측 필터 사이드바 스타일 */
        #controls {
            position: fixed;
            top: 20px; right: 20px;
            width: 240px;
            max-height: 85vh;
            background: rgba(255, 255, 255, 0.95);
            z-index: 1000;
            padding: 15px;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            overflow-y: auto;
            color: #000;
        }

        .control-title {
            font-size: 16px; font-weight: 900;
            border-bottom: 2px solid #000;
            margin-bottom: 12px; padding-bottom: 5px;
            text-align: left;
        }

        .control-group { margin-bottom: 15px; }
        
        .control-item { 
            display: flex; align-items: center; 
            margin-bottom: 8px; font-size: 13px; font-weight: 700;
            cursor: pointer;
        }

        .control-item img { width: 20px; height: 20px; margin-right: 10px; object-fit: contain; }
        .control-item input { margin-right: 8px; cursor: pointer; }

        /* 광산용 색상 박스 */
        .color-dot { width: 14px; height: 14px; border: 1px solid #000; margin-right: 10px; border-radius: 2px; }

        .divider { border-top: 1px solid #ccc; margin: 10px 0; }

        /* 사냥터 아코디언 스타일 */
        .accordion-header {
            background: #e0e0e0; padding: 8px; font-weight: 800;
            cursor: pointer; display: flex; justify-content: space-between;
            border: 1px solid #000; border-radius: 4px; font-size: 13px;
        }
        .accordion-content { display: none; padding: 10px 5px; border: 1px solid #ccc; border-top: none; }
        .accordion-content.active { display: block; }

        /* --- 기존 리플렛/마인크래프트 UI 스타일 시작 --- */
        .leaflet-popup-content-wrapper {
            background-color: #c6c6c6; 
            border: 2px solid #000000;
            border-radius: 0;
            box-shadow: inset 2px 2px 0px #ffffff, inset -2px -2px 0px #555555 !important; 
            padding: 0px;
            min-width: 50px;
        }

        .leaflet-popup-tip-container, .leaflet-popup-close-button {
            display: none !important;
        }

        .leaflet-popup-content {
            font-family: 'Pretendard', sans-serif;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            color: #000000;
            margin: 10px 14px !important;
            line-height: 1.4;
            letter-spacing: -0.5px;
            text-shadow: none !important;
        }

        #copy-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8); color: white;
            padding: 8px 16px; border: 1px solid #ffffff;
            font-size: 14px; z-index: 10000; display: none;
        }

        .mine-marker {
            border: 1px solid #000;
            box-shadow: 1px 1px 0px rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        .mine-녹 { background-color: #2ecc71; }
        .mine-황 { background-color: #f1c40f; }
        .mine-청 { background-color: #3498db; }
        .mine-적 { background-color: #e74c3c; }

        .special-mine {
            border: 2.5px solid #ffffff !important;
            box-shadow: 0 0 8px #fff, 0 0 12px #ff0000 !important;
            z-index: 1000 !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="copy-toast">복사 완료!</div>

    <div id="controls">
        <div class="control-title">지도 필터</div>
        
       <div class="control-group">
    <label class="control-item">
        <input type="checkbox" id="check-stones"> <img src="images/stone.png"> 산/동상
    </label>
    <label class="control-item">
        <input type="checkbox" id="check-npc"> <img src="forky.png"> NPC
    </label>
</div>

<div class="control-group">
    <label class="control-item">
        <input type="checkbox" id="check-red"> <img src="images/red.png"> 적환단
    </label>
    <label class="control-item">
        <input type="checkbox" id="check-pot"> <img src="images/pot.png"> 탐색(항아리)
    </label>
    <label class="control-item">
        <input type="checkbox" id="check-box"> <img src="images/box.png"> 의문의 상자
    </label>
</div>

<div class="control-group">
    <div style="font-weight: 900; margin-bottom: 8px; font-size: 13px;">광산 구역</div>
    <label class="control-item">
        <input type="checkbox" id="mine-녹"> <div class="color-dot" style="background:#2ecc71;"></div> 녹색광산
    </label>
    <label class="control-item">
        <input type="checkbox" id="mine-청"> <div class="color-dot" style="background:#3498db;"></div> 청색광산
    </label>
    <label class="control-item">
        <input type="checkbox" id="mine-황"> <div class="color-dot" style="background:#f1c40f;"></div> 황색광산
    </label>
    <label class="control-item">
        <input type="checkbox" id="mine-적"> <div class="color-dot" style="background:#e74c3c;"></div> 적색광산
    </label>
</div>

        <div class="control-group">
            <div class="accordion-header" id="hunt-accordion-btn">
                사냥터 목록 <span>▼</span>
            </div>
            <div class="accordion-content" id="hunt-accordion-content">
                </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script src="js/data.js"></script>         
    <script src="js/map-logic.js"></script>    
    <script src="js/ui-control.js"></script>   

    <script>
        // 아코디언 토글 기능
        document.getElementById('hunt-accordion-btn').addEventListener('click', function() {
            const content = document.getElementById('hunt-accordion-content');
            content.classList.toggle('active');
            this.querySelector('span').innerText = content.classList.contains('active') ? '▲' : '▼';
        });
    </script>

</body>
</html>
