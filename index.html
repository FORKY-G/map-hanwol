<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한월환해도 (0405 업데이트)</title>
    <link rel="icon" type="image/png" href="images/hanwol-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        body { margin: 0; padding: 0; background-color: #1a1a1a; font-family: 'Pretendard', sans-serif; }
        #map { width: 100vw; height: 100vh; }

        /* [수정] 컨트롤 패널 위치 조정 (닉네임 리스트 왼쪽 좌표 근처) */
        #controls-wrapper {
            position: fixed;
            top: 15px; 
            right: 150px; /* 닉네임 리스트 폭만큼 띄움 (좌표 6642 근처) */
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        /* 검색창 컨테이너 */
        #search-container {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            position: relative;
        }

        #search-input {
            width: 180px;
            padding: 6px 10px;
            border: 2px solid #000;
            font-family: 'Pretendard', sans-serif;
            font-weight: 700;
            outline: none;
        }

        /* 검색 결과 드롭다운 목록 */
        #search-results {
            position: absolute;
            top: 40px; right: 0;
            width: 240px;
            background: white;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            display: none;
            z-index: 1002;
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
        }

        .search-result-item:hover { background: #f0f0f0; }
        .search-result-item .category { font-size: 10px; color: #888; display: block; }

        /* 메뉴 열기/닫기 버튼 */
        #toggle-sidebar {
            background: #fff;
            border: 2px solid #000;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            font-size: 14px;
            margin-bottom: 5px;
        }

        /* 필터 목록 창 (위아래로 열리는 방식) */
        #controls {
            width: 240px;
            max-height: 0; /* 초기 상태: 닫힘 */
            background: rgba(255, 255, 255, 0.98);
            border: 0px solid #000; /* 닫혔을 땐 테두리 없음 */
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            overflow-y: auto;
            overflow-x: hidden;
            transition: max-height 0.4s ease, border 0.1s; /* 부드러운 펼침 */
            color: #000;
        }

        /* 메뉴가 열렸을 때 */
        #controls.active {
            max-height: 80vh;
            border: 2px solid #000;
            padding: 12px;
        }

        /* 내부 구성 요소 스타일 유지 */
        .control-header { border-bottom: 2px solid #000; margin-bottom: 12px; padding-bottom: 5px; }
        .control-title { font-size: 16px; font-weight: 900; margin: 0; }
        .control-group { margin-bottom: 15px; }
        .control-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .control-item img { width: 20px; height: 20px; margin-right: 10px; object-fit: contain; }
        .control-item input { margin-right: 8px; cursor: pointer; }
        .color-dot { width: 14px; height: 14px; border: 1px solid #000; margin-right: 10px; border-radius: 2px; }
        .divider { border-top: 1px solid #ccc; margin: 10px 0; }
        .accordion-header { background: #e0e0e0; padding: 8px; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #000; border-radius: 4px; font-size: 13px; }
        .accordion-content { display: none; padding: 10px 5px; border: 1px solid #ccc; border-top: none; }
        .accordion-content.active { display: block; }

        /* 기존 리플렛 UI 스타일 */
        .leaflet-popup-content-wrapper { background-color: #c6c6c6; border: 2px solid #000000; border-radius: 0; box-shadow: inset 2px 2px 0px #ffffff, inset -2px -2px 0px #555555 !important; padding: 0px; }
        .leaflet-popup-tip-container, .leaflet-popup-close-button { display: none !important; }
        .leaflet-popup-content { font-family: 'Pretendard', sans-serif; font-weight: 700; font-size: 13px; text-align: center; color: #000000; margin: 10px 14px !important; line-height: 1.4; letter-spacing: -0.5px; }
        #copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 8px 16px; border: 1px solid #ffffff; font-size: 14px; z-index: 10000; display: none; }
        .mine-marker { border: 1px solid #000; border-radius: 2px; }
        .mine-녹 { background-color: #2ecc71; } .mine-황 { background-color: #f1c40f; } .mine-청 { background-color: #3498db; } .mine-적 { background-color: #e74c3c; }
        .special-mine { border: 2.5px solid #ffffff !important; box-shadow: 0 0 8px #fff, 0 0 12px #ff0000 !important; z-index: 1000 !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="copy-toast">복사 완료!</div>

    <div id="controls-wrapper">
        <div id="search-container">
            <input type="text" id="search-input" placeholder="정보 및 위치 검색...">
            <div id="search-results"></div> </div>

        <div id="toggle-sidebar">▼ 한월메뉴 열기</div>
        
        <div id="controls">
            <div class="control-header">
                <h3 class="control-title">한월서버</h3>
            </div>
            </div>
    </div>
            
            <div class="control-group">
                <label class="control-item">
                    <input type="checkbox" id="check-spawn" checked> <img src="images/compass.png"> 스폰 지점
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-animals" checked> <img src="images/forky.png"> 십이지신
                </label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-item">
                    <input type="checkbox" id="check-stones"> <img src="images/stone.png"> 산/동상
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-npc"> <img src="images/forky.png"> NPC
                </label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-item">
                    <input type="checkbox" id="check-red"> <img src="images/red.png"> 적환단
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-pot"> <img src="images/pot.png"> 탐색(항아리)
                </label>
                <label class="control-item">
                    <input type="checkbox" id="check-box"> <img src="images/box.png"> 의문의 상자
                </label>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <div style="font-weight: 900; margin-bottom: 8px; font-size: 13px;">광산 구역</div>
                <label class="control-item">
                    <input type="checkbox" id="mine-녹"> <div class="color-dot" style="background:#2ecc71;"></div> 녹색광산
                </label>
                <label class="control-item">
                    <input type="checkbox" id="mine-청"> <div class="color-dot" style="background:#3498db;"></div> 청색광산
                </label>
                <label class="control-item">
                    <input type="checkbox" id="mine-황"> <div class="color-dot" style="background:#f1c40f;"></div> 황색광산
                </label>
                <label class="control-item">
                    <input type="checkbox" id="mine-적"> <div class="color-dot" style="background:#e74c3c;"></div> 적색광산
                </label>
            </div>

            <div class="control-group">
                <div class="accordion-header" id="hunt-accordion-btn">
                    사냥터 목록 <span>▼</span>
                </div>
                <div class="accordion-content" id="hunt-accordion-content"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/data.js"></script>         
    <script src="js/map-logic.js"></script>    
    <script src="js/ui-control.js"></script>   

    <script>
        // [1] 사이드바 및 버튼 요소 가져오기
        const sidebar = document.getElementById('controls');
        const toggleBtn = document.getElementById('toggle-sidebar');

        // [2] 메뉴 열기/닫기 함수
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            
            if (sidebar.classList.contains('active')) {
                toggleBtn.innerText = '▲ 한월메뉴 닫기';
            } else {
                toggleBtn.innerText = '▼ 한월메뉴 열기';
            }
        }

        // [3] 버튼 클릭 시 메뉴 토글
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // 지도 클릭 이벤트가 동시에 발생하는 것 방지
            toggleSidebar();
        });

        // [4] 지도 클릭 시 메뉴 자동 닫기 (다겸님 요청 사항)
        if (typeof map !== 'undefined') {
            map.on('click', function() {
                if (sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                    toggleBtn.innerText = '▼ 한월메뉴 열기';
                }
            });
        }

        // [4] 지도 클릭 시 메뉴 및 검색창 자동 닫기
        if (typeof map !== 'undefined') {
            map.on('click', function() {
                // 메뉴 닫기
                if (sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                    toggleBtn.innerText = '▼ 한월메뉴 열기';
                }
                // [추가] 검색 결과창 닫기
                const searchResults = document.getElementById('search-results');
                if (searchResults) searchResults.style.display = 'none';
            });
        }

        // [5] 메뉴 내부 클릭 시 닫힘 방지
        sidebar.addEventListener('click', function(e) {
            e.stopPropagation(); 
        });

        // [6] 사냥터 아코디언 토글 (기존 로직)
        const accordionBtn = document.getElementById('hunt-accordion-btn');
        if (accordionBtn) {
            accordionBtn.addEventListener('click', function() {
                const content = document.getElementById('hunt-accordion-content');
                content.classList.toggle('active');
                this.querySelector('span').innerText = content.classList.contains('active') ? '▲' : '▼';
            });
        }
    </script>
</body>
</html>
