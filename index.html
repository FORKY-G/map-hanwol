<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한월환해도 (0404 업데이트)</title>
    
    <link rel="icon" type="image/png" href="images/hanwol-icon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    </head>
<style>
    /* 1. 고딕체 폰트 불러오기 */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    body { 
        margin: 0; padding: 0; background-color: #1a1a1a; 
        font-family: 'Pretendard', sans-serif;
    }
    
    #map { width: 100vw; height: 100vh; }
    
    /* 2. 마인크래프트 UI 창 - 깔끔한 테두리와 배경 */
    .leaflet-popup-content-wrapper {
        background-color: #c6c6c6; 
        border: 2px solid #000000;
        border-radius: 0;
        box-shadow: inset 2px 2px 0px #ffffff, inset -2px -2px 0px #555555 !important; 
        padding: 0px;
        min-width: 50px;
    }

    .leaflet-popup-tip-container, .leaflet-popup-close-button {
        display: none !important;
    }

    /* 3. 글씨 스타일 기준 - 그림자를 없애고 검은색을 기본으로 */
    .leaflet-popup-content {
        font-family: 'Pretendard', sans-serif;
        font-weight: 700;
        font-size: 13px;
        text-align: center;
        color: #000000; /* 기본 글자색을 검정으로 변경 */
        margin: 10px 14px !important;
        line-height: 1.4;
        letter-spacing: -0.5px;
        text-shadow: none !important; /* 번져 보이는 그림자 제거 */
    }

    /* 복사 완료 알림 스타일 */
    #copy-toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background-color: rgba(0, 0, 0, 0.8); color: white;
        padding: 8px 16px; border: 1px solid #ffffff;
        font-size: 14px; z-index: 10000; display: none;
    }

    /* 광산 마커 스타일 (이미지 없이 CSS로 구현) */
.mine-marker {
    border: 1px solid #000;
    box-shadow: 1px 1px 0px rgba(255,255,255,0.3);
    border-radius: 2px;
}
.mine-녹 { background-color: #2ecc71; } /* 초록 */
.mine-황 { background-color: #f1c40f; } /* 노랑 */
.mine-청 { background-color: #3498db; } /* 파랑 */
.mine-적 { background-color: #e74c3c; } /* 빨강 */
</style>
<body>

    <div id="map"></div>
    <div id="copy-toast">복사 완료!</div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script src="js/data.js"></script>         
    <script src="js/map-logic.js"></script>    
    <script src="js/ui-control.js"></script>   

</body>
</html>
